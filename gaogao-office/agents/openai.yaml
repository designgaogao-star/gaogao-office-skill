interface:
  display_name: "GaoGao Office"
  short_description: "让项目总管接管长期 AI 项目，并把需求路由给合适员工"
  default_prompt: "使用 $gaogao-office 直接只读体检当前项目，并按用户语言回复；若用途不清只问一句。随后展示短流程图和动态 A/B/C/D：A 是推荐的单员工或多员工正式接管，B 是另一种正式接管，C 自定义，D 以后再说。用户选 A/B 后，再创建 Agent Office、备份并应用 AGENTS.md，并按组织方式入职员工。多员工收到需求时，项目总管先判断最终目标和任务归属：员工职责明确就派工，不明确再补问一句，小型办公室事务自己处理。派工后默认停止，使用 1/2/3 告知继续方式；用户回复“盯进度 T-xxx”时，才按 30-60 秒动态间隔查看员工状态。"
policy:
  allow_implicit_invocation: true
