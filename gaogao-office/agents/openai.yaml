interface:
  display_name: "GaoGao Office"
  short_description: "接管长期 AI 项目，按状态和授权路由任务、调度员工、维护项目记忆"
  default_prompt: "使用 $gaogao-office 只读体检当前项目；若用户问说明书/help，只介绍能力不扫描项目。接管时先给动态 A/B/C/D 组织方案，用户批准后再创建 Agent Office、应用 AGENTS.md、邀请员工入职。多员工模式下当前窗口担任项目总监，先路由任务再派工，派工后默认停止；盯进度必须用户明确要求。"
policy:
  allow_implicit_invocation: true
